<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Management MVP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f7f8fb;
        color: #032147;
      }
      body {
        margin: 0;
        padding: 32px;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
        border: 1px solid rgba(3, 33, 71, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 16px;
        color: #888888;
        line-height: 1.6;
      }
      button {
        border: none;
        background: #753991;
        color: #ffffff;
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .status {
        margin-top: 16px;
        font-weight: 600;
        color: #209dd7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from the Project Management MVP</h1>
      <p>
        This is a static HTML page served by FastAPI. Use the button below to
        call the API health endpoint.
      </p>
      <button type="button" id="check-api">Check API</button>
      <div class="status" id="api-status">API status: not checked</div>
    </main>

    <script>
      const statusEl = document.getElementById("api-status");
      document.getElementById("check-api").addEventListener("click", async () => {
        statusEl.textContent = "API status: checking...";
        try {
          const response = await fetch("/api/health");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          statusEl.textContent = `API status: ${data.status}`;
        } catch (error) {
          statusEl.textContent = "API status: error";
          console.error(error);
        }
      });
    </script>
  </body>
</html>
